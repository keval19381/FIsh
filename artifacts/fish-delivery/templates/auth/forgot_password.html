{% extends "base.html" %}
{% block title %}Forgot Password — FishDelivery{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🔑</div>
      <h1>Forgot Password?</h1>
      <p>No worries — we'll send you a reset link</p>
    </div>

    <form method="POST" class="with-loading">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control"
               required placeholder="Enter your email" autofocus/>
        <div class="form-hint">We'll send a password reset link to this address</div>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full">Send Reset Link 📧</button>
    </form>

    <div style="text-align:center;margin-top:1.25rem">
      <a href="{{ url_for('login') }}" style="font-size:.85rem;color:var(--text-muted);font-weight:500">
        ← Back to Login
      </a>
    </div>
  </div>
</div>
{% endblock %}
