{% extends "base.html" %}
{% block title %}Verify Email — FishDelivery{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">📧</div>
      <h1>Verify Your Email</h1>
      <p>Enter the 6-digit code sent to your email</p>
    </div>

    <form method="POST" class="with-loading">
      <div class="form-group">
        <label class="form-label" for="otp">Verification Code</label>
        <input type="text" id="otp" name="otp" class="form-control"
               required maxlength="6" pattern="[0-9]{6}"
               placeholder="Enter 6-digit code"
               style="font-size:1.4rem;text-align:center;letter-spacing:.3em;font-weight:700"/>
        <div class="form-hint">Check your inbox for the verification code</div>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full">Verify Email ✓</button>
    </form>

    <div style="text-align:center;margin-top:1.25rem">
      <a href="{{ url_for('register') }}" style="font-size:.85rem;color:var(--primary);font-weight:500">
        Didn't receive the code? Resend
      </a>
    </div>
  </div>
</div>
{% endblock %}
