{% extends "base.html" %}
{% set hide_nav = true %}
{% block title %}Login — FishDelivery{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🐟</div>
      <h1>Welcome Back</h1>
      <p>Sign in to your FishDelivery account</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" class="with-loading">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full" style="margin-top:0.5rem;">Login →</button>
    </form>

    <div class="divider">or</div>

    <div class="text-center">
      <p class="text-muted" style="margin-bottom:0.75rem;">Don't have an account?</p>
      <a href="{{ url_for('register') }}" class="btn btn-outline btn-full">Create Account</a>
    </div>

    <div style="margin-top:1.5rem;padding:1rem;background:var(--primary-light);border-radius:var(--radius-sm);font-size:0.8rem;color:var(--primary);">
      <strong>Demo Admin:</strong> admin@fish.com / admin123
    </div>
  </div>
</div>
{% endblock %}
