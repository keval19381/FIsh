{% extends "base.html" %}
{% set hide_nav = true %}
{% block title %}Login — AquaBasket{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🐟</div>
      <h1>Welcome Back</h1>
      <p>Sign in to your AquaBasket account</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" class="with-loading">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full" style="margin-top:.5rem">Login →</button>
    </form>

    <div style="text-align:right;margin-top:.75rem">
      <a href="{{ url_for('forgot_password') }}" style="font-size:.85rem;color:var(--primary);font-weight:500">Forgot password?</a>
    </div>

    <div class="divider">or</div>

    <div>
      <p class="text-muted" style="font-size:.88rem;margin-bottom:.75rem;text-align:center">Don't have an account?</p>
      <a href="{{ url_for('register') }}" class="btn btn-outline btn-full">Create Account</a>
    </div>

    <div style="margin-top:1.5rem;padding:1rem;background:var(--primary-light);border-radius:var(--radius);font-size:.82rem;color:var(--primary-dark);">
      <strong>Demo Admin:</strong> admin@fish.com / admin123
    </div>
  </div>
</div>
{% endblock %}
