{% extends "base.html" %}
{% block title %}Reset Password — FishDelivery{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🔒</div>
      <h1>Reset Password</h1>
      <p>Enter your new password below</p>
    </div>

    <form method="POST" class="with-loading" id="reset-form">
      <div class="form-group">
        <label class="form-label" for="password">New Password</label>
        <input type="password" id="password" name="password" class="form-control"
               required placeholder="Enter new password" minlength="8" autofocus/>
        <div class="form-hint">Minimum 8 characters</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" class="form-control"
               required placeholder="Confirm new password"/>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full">Reset Password ✓</button>
    </form>

    <div style="text-align:center;margin-top:1.25rem">
      <a href="{{ url_for('login') }}" style="font-size:.85rem;color:var(--text-muted);font-weight:500">
        ← Back to Login
      </a>
    </div>
  </div>
</div>

<script>
document.getElementById('reset-form').addEventListener('submit', function(e) {
  const pw = document.getElementById('password').value;
  const cpw = document.getElementById('confirm_password').value;
  if (pw !== cpw) { e.preventDefault(); alert('Passwords do not match!'); return; }
  if (pw.length < 8) { e.preventDefault(); alert('Password must be at least 8 characters!'); return; }
});
</script>
{% endblock %}
